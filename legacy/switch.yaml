command_line:
  # Switch — ON/OFF control (unchanged)
  - switch:
      name: Pellet Stove
      unique_id: switch_pellet_stove
      command_on: "python3 /config/scripts/stoveOnOff.py on"
      command_off: "python3 /config/scripts/stoveOnOff.py off"
      command_state: "python3 /config/scripts/stoveOnOff.py status"
      value_template: "{{ value == '1' }}"
      scan_interval: 300

  # Sensor — full stove info as JSON with attributes
  - sensor:
      name: Pellet Stove Info
      unique_id: sensor_pellet_stove_info
      command: "python3 /config/scripts/stoveOnOff.py info"
      json_attributes:
        - power_state
        - status_text
        - room_temperature
        - working_power
        - set_temperature
        - online
      value_template: "{{ value_json.room_temperature | default(0) }}"
      unit_of_measurement: "°C"
      scan_interval: 300
